# Universal Voice AI Platform - Docker Compose Configuration
# Phase 1: Local Development Infrastructure

version: '3.8'

services:
  # ==========================================
  # Database Services
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: voice-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceai_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-voiceai_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceai} -d ${POSTGRES_DB:-voiceai_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice-ai-network

  redis:
    image: redis:7-alpine
    container_name: voice-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice-ai-network

  # ==========================================
  # Application Services
  # ==========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: voice-ai-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-voiceai}:${POSTGRES_PASSWORD:-voiceai_dev_password}@postgres:5432/${POSTGRES_DB:-voiceai_platform}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_API_KEY: ${TWILIO_API_KEY}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3001}
      VOICE_ENGINE_URL: ${VOICE_ENGINE_URL:-http://voice-engine:3002}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/database/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voice-ai-network
    command: npm run dev --workspace=@voice-ai/api

  voice-engine:
    build:
      context: .
      dockerfile: apps/voice-engine/Dockerfile
      target: development
    container_name: voice-ai-voice-engine
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3002
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-voiceai}:${POSTGRES_PASSWORD:-voiceai_dev_password}@postgres:5432/${POSTGRES_DB:-voiceai_platform}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_API_KEY: ${TWILIO_API_KEY}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_URL: ${API_URL:-http://api:3001}
      VOICE_ENGINE_URL: ${VOICE_ENGINE_URL:-http://localhost:3002}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/voice-engine/node_modules
      - /app/packages/database/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - voice-ai-network
    command: npm run dev --workspace=@voice-ai/voice-engine

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: voice-ai-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NEXT_PUBLIC_VOICE_ENGINE_URL: ${VOICE_ENGINE_URL:-http://localhost:3002}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
      - nextjs_cache:/app/apps/web/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
      - voice-engine
    networks:
      - voice-ai-network
    command: npm run dev --workspace=@voice-ai/web

  # ==========================================
  # Optional: Admin Tools
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voice-ai-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@voiceai.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - voice-ai-network
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: voice-ai-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - voice-ai-network
    profiles:
      - tools

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  nextjs_cache:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  voice-ai-network:
    driver: bridge
    name: voice-ai-network
